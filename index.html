<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Assignment 3</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1 id="greetingText">Hello</h1>

    <div class="boxes">
      <button id="redBox" type="button">Red</button>
      <button id="blueBox" type="button">Blue</button>
      <button id="greenBox" type="button">Green</button>
      <button id="yellowBox" type="button">Yellow</button>
    </div>

    <div class="greeting-area">
      <input id="nameInput" type="text" placeholder="Enter your name" />
      <button id="greetButton" type="button">Greet</button>
    </div>

    <script src="js/script.js"></script>
  </body>
